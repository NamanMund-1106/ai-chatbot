<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #080808; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-box { width: 420px; background: #0d0d0d; border-radius: 20px; border: 0.5px solid #2a2a2a; overflow: hidden; }
        .chat-header { padding: 16px 20px; background: #111; border-bottom: 0.5px solid #222; display: flex; align-items: center; gap: 12px; }
        .header-dot { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6c47ff, #00d4aa); display: flex; align-items: center; justify-content: center; }
        .header-dot i { color: #fff; font-size: 17px; }
        .header-text { flex: 1; }
        .header-text p { margin: 0; font-size: 14px; font-weight: 600; color: #fff; }
        .header-text span { font-size: 11px; color: #00d4aa; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00d4aa; box-shadow: 0 0 6px #00d4aa; }
        .messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #0d0d0d; }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .msg { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; }
        .bot { background: #1a1a1a; color: #e0e0e0; border: 0.5px solid #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: linear-gradient(135deg, #6c47ff, #5234cc); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 10px; margin-top: 4px; }
        .user .msg-time { color: rgba(255,255,255,0.4); text-align: right; }
        .bot .msg-time { color: #444; }
        .typing { display: flex; align-items: center; gap: 5px; padding: 10px 14px; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
        .typing span { width: 6px; height: 6px; border-radius: 50%; background: #6c47ff; animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }
        .suggestions { display: flex; gap: 6px; padding: 8px 16px 4px; background: #0d0d0d; flex-wrap: wrap; }
        .chip { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 20px; padding: 5px 12px; font-size: 11px; color: #888; cursor: pointer; transition: all 0.2s; }
        .chip:hover { border-color: #6c47ff; color: #a78bfa; }
        .input-area { padding: 12px 16px; background: #111; border-top: 0.5px solid #222; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 20px; padding: 10px 16px; color: #e0e0e0; font-size: 13px; outline: none; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
        .input-area input::placeholder { color: #444; }
        .input-area input:focus { border-color: #6c47ff; }
        .send-btn { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #6c47ff, #00d4aa); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
        .send-btn:hover { transform: scale(1.08); }
        .send-btn i { color: #fff; font-size: 16px; }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="chat-header">
            <div class="header-dot"><i class="ti ti-robot"></i></div>
            <div class="header-text">
                <p>Support AI</p>
                <span>● Online</span>
            </div>
            <div class="status-dot"></div>
        </div>
        <div class="messages" id="chatMessages">
            <div class="msg bot">Hey! I'm your AI assistant. Ask me anything.<div class="msg-time">Just now</div></div>
        </div>
        <div class="suggestions" id="chips">
            <div class="chip" onclick="quickSend('Hello!')">Say hello</div>
            <div class="chip" onclick="quickSend('What can you do?')">What can you do?</div>
            <div class="chip" onclick="quickSend('Track my order')">Track order</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button class="send-btn" onclick="sendMessage()"><i class="ti ti-send"></i></button>
        </div>
    </div>
    <script>
        function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        function addMsg(text, type) {
            const box = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = text + '<div class="msg-time">' + getTime() + '</div>';
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }
        function showTyping() {
            const box = document.getElementById('chatMessages');
            const t = document.createElement('div'); t.className = 'typing'; t.id = 'typing';
            t.innerHTML = '<span></span><span></span><span></span>';
            box.appendChild(t); box.scrollTop = box.scrollHeight;
        }
        function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
        async function botReply(msg) {
            showTyping();
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            removeTyping();
            addMsg(data.bot_response, 'bot');
        }
        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim(); if (!msg) return;
            document.getElementById('chips').style.display = 'none';
            addMsg(msg, 'user'); input.value = ''; botReply(msg);
        }
        function quickSend(msg) {
            document.getElementById('chips').style.display = 'none';
            addMsg(msg, 'user'); botReply(msg);
        }
        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
